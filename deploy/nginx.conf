# /etc/nginx/sites-available/ari-mm  (symlink into sites-enabled)
# Cloudflare Full (Strict) SSL setup.
# FastAPI serves at root (/); nginx strips the /ari-editor prefix.

# Extract path after /ari-editor from raw URI to preserve %2F in disease IRIs.
map $request_uri $backend_path {
    ~^/ari-editor(.*) $1;
}

server {
    listen 80;
    server_name aurint.ca www.aurint.ca;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name aurint.ca www.aurint.ca;

    # Cloudflare Origin Certificate (free, from Cloudflare dashboard)
    # SSL/TLS → Origin Server → Create Certificate
    ssl_certificate     /etc/ssl/certs/aurint.ca.pem;
    ssl_certificate_key /etc/ssl/private/aurint.ca.key;

    # Don't merge slashes — %2F in IRIs looks like a slash to nginx
    merge_slashes off;

    # Security: deny access to dotfiles (.git, .env, etc.)
    location ~ /\.(git|env) { deny all; return 404; }
    location ~ /\.          { deny all; return 404; }

    # Strip the /ari-editor prefix preserving %2F in disease IRIs.
    # Using $backend_path (from map on $request_uri) keeps the raw encoded URI.
    location /ari-editor/ {
        proxy_pass http://127.0.0.1:8001$backend_path;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Script-Name /ari-editor;
    }

    # Redirect / to /ari-editor/ (optional convenience)
    location = / {
        return 301 /ari-editor/;
    }
}
